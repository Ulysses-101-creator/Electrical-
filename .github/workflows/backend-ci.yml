name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: electricquote
          POSTGRES_PASSWORD: electricquote
          POSTGRES_DB: electricquote_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U electricquote"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://electricquote:electricquote@localhost:5432/electricquote_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://electricquote:electricquote@localhost:5432/electricquote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          PASSWORD_HASH_PEPPER: test-pepper
        run: pytest --cov=app --cov-report=term-missing
